    <style>

            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;

        }

        #fireballBtn:hover { background: #d35400; }
    </style>
</head>

document.getElementById('punchBtn').addEventListener('click', () => {
    if (state === 'idle') {
        state = 'punch';
        animationTimer = 0;
    }
});

document.getElementById('fireballBtn').addEventListener('click', () => {
    if (state === 'idle') {
        state = 'fireball';
        animationTimer = 0;
    }
});

// Primary Game/Render loop
function update(time) {
    // Clear screen
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw simple background floor line
    ctx.strokeStyle = '#7f8c8d';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(0, 210);
    ctx.lineTo(canvas.width, 210);
    ctx.stroke();

    animationTimer++;

    // --- PROCEDURAL ENGINE STATE MACHINE ---
    if (state === 'idle') {
        // Continuous organic breathing rhythm using a sine wave
        bounceY = Math.sin(time * 0.007) * 4; 
        stretchX = 1 + Math.sin(time * 0.007) * 0.02;
        stretchY = 1 - Math.sin(time * 0.007) * 0.02;
        rotation = 0;
        offsetX = 0;

    } else if (state === 'punch') {
        // Sudden forward spring frame calculations
        if (animationTimer < 5) {
            // Wind up backward slightly
            offsetX = -10;
            stretchX = 0.95;
        } else if (animationTimer >= 5 && animationTimer  >=20) {
            state = 'idle';
        }
    }

    // --- DRAW CHARACTERS WITH DEFORMATIONS ---
    if (fighterImg.complete) {
        ctx.save();
        
        // Base positioning coordinates
        const baseImgWidth = 128;
        const baseImgHeight = 128;
        const xPos = 80 + offsetX;
        const yPos = 80 + bounceY;

        // Shift origin coordinates directly to character feet to rotate and scale correctly
        ctx.translate(xPos + baseImgWidth / 2, yPos + baseImgHeight);
        ctx.rotate(rotation);
        ctx.scale(stretchX, stretchY);
        
        // Draw the image onto the transformed space
        ctx.drawImage(fighterImg, -baseImgWidth / 2, -baseImgHeight, baseImgWidth, baseImgHeight);
        
        ctx.restore();
    } else {
        // Loading placeholder if image buffer takes a millisecond to pull
        ctx.fillStyle = '#fff';
        ctx.fillText("Generating Assets...", 80, 140);
    }

    // --- RENDER SEPARATE FIREBALL ENTITIES ---
    updateAndRenderFireballs();

    requestAnimationFrame(update);
}

// Function to generate the independent fireball visual effect
function spawnFireball(startX, startY) {
    fireballs.push({
        x: startX,
        y: startY,
        speed: 8,
        size: 16,
        pulse: 0
    });
}

function updateAndRenderFireballs() {
    for (let i = fireballs.length - 1; i >= 0; i--) {
        let f = fireballs[i];
        f.x += f.speed;
        f.pulse += 0.5;

        // Draw a multi-layered pixelated aura directly via code blocks
        let dynamicSize = f.size + Math.sin(f.pulse) * 4;

        // Outer Yellow Core
        ctx.fillStyle = '#f1c40f';
        ctx.fillRect(f.x - 4, f.y - dynamicSize/2, dynamicSize + 8, dynamicSize);
        
        // Inner Orange Glow Core
        ctx.fillStyle = '#e67e22';
        ctx.fillRect(f.x, f.y - (dynamicSize-6)/2, dynamicSize, dynamicSize - 6);

        // White hot center point
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(f.x + 6, f.y - 4, 8, 8);

        // Delete when exiting screen boundaries
        if (f.x > canvas.width) {
            fireballs.splice(i, 1);
        }
    }
}

// Start processing loop
requestAnimationFrame(update);
</script>
