<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokemon Quiz Battle — Create Your Character</title>
  <style>

    /* ── Base ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Card ── */
    .card {
      background: #16213e;
      border: 2px solid #534AB7;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Title ── */
    .title {
      text-align: center;
    }

    .title h1 {
      font-size: 22px;
      color: white;
      margin-bottom: 4px;
    }

    .title p {
      font-size: 13px;
      color: #888;
    }

    .player-badge {
      display: inline-block;
      background: #534AB7;
      color: white;
      font-size: 11px;
      font-weight: bold;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ── Upload zone ── */
    .upload-zone {
      border: 2px dashed #534AB7;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .upload-zone:hover {
      border-color: #7B73D4;
      background: #1e1e3a;
    }

    .upload-zone.has-image {
      border-style: solid;
      border-color: #1D9E75;
      padding: 12px;
    }

    /* Hide the real file input — we style our own button */
    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      font-size: 36px;
      margin-bottom: 8px;
    }

    .upload-text {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 4px;
    }

    .upload-subtext {
      font-size: 12px;
      color: #555;
    }

    /* ── Preview image ── */
    #previewImg {
      width: 100%;
      max-width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
      margin: 0 auto;
      display: block;
    }

    .preview-container {
      display: none;       /* whole container hidden until needed */
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .preview-container.visible {
      display: flex;
    }

    .preview-label {
      font-size: 12px;
      color: #1D9E75;
    }

    .change-photo {
      font-size: 12px;
      color: #888;
      text-decoration: underline;
      cursor: pointer;
      background: none;
      border: none;
      color: #888;
    }

    .change-photo:hover { color: #aaa; }

    /* ── Name input ── */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-group label {
      font-size: 13px;
      color: #aaa;
    }

    .input-group input {
      padding: 10px 14px;
      background: #222244;
      border: 1px solid #534AB7;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus {
      border-color: #7B73D4;
    }

    .input-group input::placeholder {
      color: #555;
    }

    /* ── Button ── */
    .btn-primary {
      padding: 13px;
      background: #534AB7;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      width: 100%;
    }

    .btn-primary:hover  { background: #6358C8; }
    .btn-primary:active { transform: scale(0.98); }

    .btn-primary:disabled {
      background: #333;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Status message ── */
    #status {
      text-align: center;
      font-size: 13px;
      min-height: 18px;
    }

    .status-error   { color: #E24B4A; }
    .status-success { color: #1D9E75; }
    .status-info    { color: #BA7517; }

    /* ── Step indicator ── */
    .steps {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .step {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid #534AB7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      color: #534AB7;
    }

    .step.active {
      background: #534AB7;
      color: white;
    }

    .step-line {
      width: 40px;
      height: 2px;
      background: #333;
      align-self: center;
    }

    .step.completed {
  background: #1D9E75;
  border-color: #1D9E75;
  color: white;
}

    .back-button{
margin-right:auto;
}

    #back-button{
	display:none;
      padding: 13px;
      background: #534AB7;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      width: 100%;
    }

  </style>
</head>
<body>

  <div class="card">

    <div class="back-button"><button id="back-button" onclick="goBack()">Back</button></div>

    <!-- Step indicator -->
    <div class="steps">
      <div class="step active">1</div>
      <div class="step-line"></div>
      <div class="step">2</div>
      <div class="step-line"></div>
      <div class="step">3</div>
    </div>

    <!-- Title -->
    <div class="title">
      <div class="player-badge" id="playerBadge">Player 1</div>
      <h1>Create Your Character</h1>
      <p>Upload a selfie to generate your pixel art fighter</p>
    </div>

    <!-- Upload zone (hidden once photo picked) -->
    <div class="upload-zone" id="uploadZone">
      <input
        type="file"
        id="fileInput"
        accept="image/*"
        onchange="handleFileSelect(event)"
      />
      <div class="upload-icon">📷</div>
      <div class="upload-text">Click to upload your selfie</div>
      <div class="upload-subtext">JPG, PNG, or WEBP • Max 5MB</div>
    </div>

    <!-- Preview (hidden until photo picked) -->
    <div class="preview-container" id="previewContainer">
      <div class="preview-label">✓ Photo ready</div>
      <img id="previewImg" alt="Your photo preview" />
      <button class="change-photo" onclick="resetPhoto()">Change photo</button>
    </div>

    <!-- Name input -->
    <div class="input-group">
      <label for="nameInput">Your fighter name</label>
      <input
        type="text"
        id="nameInput"
        placeholder="Enter your name"
        maxlength="20"
      />
    </div>

    <!-- Submit button -->
    <button class="btn-primary" id="continueBtn" onclick="handleContinue()">
      Generate My Character →
    </button>

    <!-- Status message -->
    <div id="status"></div>

  </div>

  <script src="js/config.js"></script>

  <script>

    // Stores the base64 image data once a file is picked
    let selectedImageBase64 = null

    // ── Handle file selection ────────────────────────────────────────
    function handleFileSelect(event) {
      const file = event.target.files[0]

      // Guard — did they actually pick a file?
      if (!file) return

      // Guard — is it actually an image?
      if (!file.type.startsWith('image/')) {
        showStatus('Please upload an image file (JPG, PNG, or WEBP)', 'error')
        return
      }

      // Guard — is it too large? (5MB limit)
      const fiveMB = 5 * 1024 * 1024
      if (file.size > fiveMB) {
        showStatus('Image is too large. Please use a photo under 5MB.', 'error')
        return
      }

      // read the file
      const reader = new FileReader()

      reader.onload = function(e) {
        const base64 = e.target.result

        // Store it so we can use it later when calling the AI
        selectedImageBase64 = base64

        // Show the preview
        document.getElementById('previewImg').src = base64
        document.getElementById('previewContainer').classList.add('visible')

        // Hide the upload zone
        document.getElementById('uploadZone').style.display = 'none'

        showStatus('', '')   // clear any previous error
      }

      reader.readAsDataURL(file)
    }

    // ── Reset — let them pick a different photo ──────────────────────
    function resetPhoto() {
      selectedImageBase64 = null
      document.getElementById('fileInput').value = ''
      document.getElementById('previewContainer').classList.remove('visible')
      document.getElementById('uploadZone').style.display = 'block'
      document.getElementById('previewImg').src = ''
      showStatus('', '')
    }

    function compressImage(base64) {
  return new Promise((resolve) => {
    const img = new Image()

    img.onload = function() {
      // Create a canvas to redraw the image at smaller size
      const canvas = document.createElement('canvas')
      canvas.width  = 512
      canvas.height = 512

      const ctx = canvas.getContext('2d')

      // Draw the image scaled down to 512x512
      ctx.drawImage(img, 0, 0, 512, 512)

      // Convert back to base64 at 60% quality
      const compressed = canvas.toDataURL('image/jpeg', 0.6)
      resolve(compressed)
    }

    img.src = base64
  })
}

async function generateSprite(base64Photo) {
  // Step 1 — compress the image first
  showStatus('Compressing image...', 'info')
  const compressed = await compressImage(base64Photo)

  // Replicate needs the base64 WITHOUT the "data:image/jpeg;base64," prefix
  // It only wants the raw base64 data
  const base64Data = compressed.split(',')[1]

  // Step 2 — send to Replicate to start the prediction
  showStatus('Sending to AI...', 'info')

  let predictionId

  try {
    const startResponse = await fetch(`${CONFIG.PROXY_URL}/predict`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        version: 'retro-diffusion/rd-fast',
        input: {
          prompt: 'portrait game character sprite, facing forward, Street Fighter style',
          style: 'portrait',
          width: 128,
          height: 128,
          remove_bg: true,
          image: `data:image/jpeg;base64,${base64Data}`
        }
      })
    })

    if (!startResponse.ok) {
      const err = await startResponse.json()
      throw new Error('Failed to start: ' + (err.detail || startResponse.status))
    }

    const prediction = await startResponse.json()
    predictionId = prediction.id
    console.log('Prediction started, ID:', predictionId)

  } catch (error) {
    throw new Error('Could not connect to AI: ' + error.message)

    // Optional: use placeholder and continue anyway during development
    // Uncomment these lines if you want to skip the AI and test the rest of the game:
    // const player = { name, photo: selectedImageBase64, sprite: 'images/placeholder-sprite.jpg', ... }
    // localStorage.setItem(playerKey, JSON.stringify(player))
    // showHandoff()

  }

  // Step 3 — poll until the result is ready
  showStatus('Generating your sprite... (this takes 10–20 seconds)', 'info')

  const spriteUrl = await pollForResult(predictionId)
  return spriteUrl
}

async function pollForResult(predictionId) {
  const maxAttempts = 60   // try for up to 60 seconds
  let attempts = 0

  while (attempts < maxAttempts) {
    // Wait 2 seconds between each check
    await wait(2000)
    attempts++

    try {
  const response = await fetch(
  `${CONFIG.PROXY_URL}/predict/${predictionId}`
  // No headers needed — Worker handles auth
)

      const result = await response.json()
      console.log('Poll attempt', attempts, '— status:', result.status)

      if (result.status === 'succeeded') {
        // result.output is an array — the image URL is the first item
        return result.output[0]
      }

      if (result.status === 'failed') {
        throw new Error('AI generation failed: ' + result.error)
      }

      // status is 'starting' or 'processing' — keep polling
      showStatus(
        `Generating your sprite... (${attempts * 2}s elapsed)`,
        'info'
      )

    } catch (error) {
      throw new Error('Polling error: ' + error.message)
    }
  }

  throw new Error('Timed out — AI took too long to respond')
}

// Helper — pause for a number of milliseconds
function wait(ms) {
  return new Promise(resolve => setTimeout(resolve, ms))
}

    // ── Handle the continue button ───────────────────────────────────
    async function handleContinue() {
      const name = document.getElementById('nameInput').value.trim()
       const btn  = document.getElementById('continueBtn')

      // Validate — photo first
      if (!selectedImageBase64) {
        showStatus('Please upload a photo first.', 'error')
        return
      }

      // Validate — name required
      if (!name) {
        showStatus('Please enter your fighter name.', 'error')
        return
      }

        // Disable button so they can't click twice
        btn.disabled = true
btn.textContent = 'Generating...'

try {
  let spriteUrl

  // Check if this player already has a sprite AND the photo hasn't changed
  const existingPlayer = JSON.parse(localStorage.getItem(getCurrentPlayerKey()))
  const photoChanged = !existingPlayer || existingPlayer.photo !== selectedImageBase64

  if (!photoChanged && existingPlayer.sprite) {
    // Reuse the existing sprite — no API call needed
    console.log('Photo unchanged — reusing existing sprite')
    spriteUrl = existingPlayer.sprite
    showStatus('Using existing sprite...', 'info')
    await wait(2000)   // small delay so it doesn't feel instant
  } else {
    // Photo is new — generate a fresh sprite
    spriteUrl = await generateSprite(selectedImageBase64)
  }

  console.log('Sprite URL:', spriteUrl)

      // save to localStorage
      const playerKey = getCurrentPlayerKey()   // 'player1' or 'player2'

      const player = {
        name: name,
        photo: selectedImageBase64,    // original photo for sending to AI
        sprite: spriteUrl,                 
        moves: [],
        hp: 200,
        maxHP: 200,
        streak: 0,
        critPending: false,
        storedBonus: 0
      }

      localStorage.setItem(playerKey, JSON.stringify(player))
      localStorage.removeItem('editingPlayer')

          showStatus('Character created!', 'success')
           btn.textContent = 'Done!'

          // Show the generated sprite briefly before navigating
          showSpritePreview(spriteUrl, name)

      showStatus('Saved! Moving to next step...', 'success')

      // Navigate after a short delay
      setTimeout(() => {
        // Check if player 1 is done — if so, set up player 2
        if (playerKey === 'player1') {
          showHandoff()
        } else {
          // Both players done — go to catalogue
          window.location.href = 'pages/catalogue.html'
        }
      }, 2500)
    }catch (error){
       // Something went wrong — show error, re-enable button
    console.error(error)
    showStatus('Generation failed: ' + error.message + ' — try again', 'error')
    btn.disabled = false
    btn.textContent = 'Generate My Character →'
  }
}

  function showSpritePreview(spriteUrl, name) {
    const container = document.getElementById('previewContainer')

    container.innerHTML = `
      <div style="text-align:center; display:flex; flex-direction:column; align-items:center; gap:10px">
        <div style="font-size:12px; color:#1D9E75">✓ Your character is ready!</div>
        <img src="${spriteUrl}" alt="Your pixel art sprite"
            style="width:128px; height:128px; image-rendering:pixelated; border-radius:8px; border:2px solid #1D9E75"
        />
        <div style="font-size:16px; font-weight:bold; color:white">${name}</div>
      </div>
  `
  container.classList.add('visible')
}


    // ── Handoff screen between Player 1 and Player 2 ────────────────
    function showHandoff() {
      document.querySelector('.card').innerHTML = `
        <div style="text-align:center; padding: 20px; display:flex; flex-direction:column; gap:20px">
          <div style="font-size:48px">✅</div>
          <h2 style="color:#1D9E75">Player 1 Done!</h2>
          <p style="color:#aaa; font-size:14px">
            Hand the device to Player 2.<br>Don't let them see your moves!
          </p>
          <button class="btn-primary" onclick="setupPlayer2()">
            I'm Player 2 — Start Setup →
          </button>
        </div>
      `
    }

    function goBack(){
    localStorage.setItem('setupPhase','player1');
    window.location.reload();
    }

    function restorePlayerData(){
      const playerKey= getCurrentPlayerKey();
      
      const player=JSON.parse(localStorage.getItem(playerKey));
        if(player){
        selectedImageBase64=player.photo;
        document.getElementById('previewImg').src = selectedImageBase64;
        document.getElementById('previewContainer').classList.add('visible');
        document.getElementById('uploadZone').style.display = 'none';
        document.getElementById('nameInput').value=player.name;
        }
      }
    

    function setupPlayer2() {
      // Reload the page but now set up player 2
      localStorage.setItem('setupPhase', 'player2')
      window.location.reload()
    }

    // ── Work out which player is being set up ────────────────────────
    function getCurrentPlayerKey() {
      return localStorage.getItem('setupPhase') === 'player2' ? 'player2' : 'player1'
    }

    // ── Update badge and title for player 2 ─────────────────────────
    function toPlayer2() {
 const key = getCurrentPlayerKey()

  // Update badge
  const badge = document.getElementById('playerBadge')
  if (key === 'player2') {
    badge.textContent = 'Player 2'
    badge.style.background = '#E24B4A'
    document.getElementById('back-button').style.display = 'flex'
  } else {
    badge.textContent = 'Player 1'
    badge.style.background = '#534AB7'
  }

  // Update step indicator — step 1 is always active on this page
  // Step 2 activates when we reach catalogue, step 3 when battle starts
  const steps = document.querySelectorAll('.step')
  steps.forEach((step, i) => {
    step.classList.remove('active')
    if (i === 0) step.classList.add('active')
  })
}

    // ── Show a status message ────────────────────────────────────────
    function showStatus(message, type) {
      const el = document.getElementById('status')
      el.textContent = message
      el.className = type === 'error' ? 'status-error'
                   : type === 'success' ? 'status-success'
                   : type === 'info' ? 'status-info'
                   : ''
    }

    // Run on page load
    toPlayer2()
    restorePlayerData()

    history.pushState(null, '', window.location.href)
    window.addEventListener('popstate',function(){
      localStorage.setItem('setupPhase','player2')
      window.location.reload()
    })

    // Development helper — call clearAllData() in console to reset everything
function clearAllData() {
  localStorage.removeItem('player1')
  localStorage.removeItem('player2')
  localStorage.removeItem('setupPhase')
  localStorage.removeItem('editingPlayer')
  console.log('All player data cleared. Reloading...')
  window.location.reload()
}

  </script>

</body>
</html>
