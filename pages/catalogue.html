<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Move Catalogue</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 20px;
    }

    h1 { color: #534AB7; font-size: 24px; }
    p  { color: #888; font-size: 14px; }

    .players {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .player-card {
      background: #16213e;
      border: 2px solid #534AB7;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      min-width: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .player-card img {
      width: 96px;
      height: 96px;
      image-rendering: pixelated;
      border-radius: 8px;
      border: 2px solid #534AB7;
      background: #222244;
    }

    .player-name {
      font-size: 16px;
      font-weight: bold;
    }

    .hp-bar-track {
      width: 100%;
      height: 8px;
      background: #333;
      border-radius: 4px;
      overflow: hidden;
    }

    .hp-bar-fill {
      height: 100%;
      background: #1D9E75;
      border-radius: 4px;
    }

    .coming-soon {
      background: #222244;
      border: 1px dashed #534AB7;
      border-radius: 12px;
      padding: 20px 40px;
      color: #555;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>⚔️ Move Catalogue</h1>
  <p>Both characters are ready — pick your moves!</p>

  <div class="players" id="playersDisplay"></div>

  <div class="coming-soon">
    Move selection coming in Task 12 →
  </div>

  <script>
    // Load and display both players to confirm data carried over correctly
    function displayPlayers() {
      const container = document.getElementById('playersDisplay')
      const keys = ['player1', 'player2']

      keys.forEach((key, i) => { //for(int i; i<keys.length;i++)
        const raw = localStorage.getItem(key) //remember localStorage only stores string like '{"name":"Pikachu","hp":100}'
        if (!raw) return

        const player = JSON.parse(raw) 

        const card = document.createElement('div')
        card.className = 'player-card'
        card.innerHTML = `
          <img
            src="${player.sprite || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1 1%22/>'}"
            alt="${player.name}'s sprite"
            onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2296%22 height=%2296%22><rect width=%2296%22 height=%2296%22 fill=%22%23534AB7%22/><text x=%2248%22 y=%2256%22 font-size=%2240%22 text-anchor=%22middle%22 fill=%22white%22>?</text></svg>'"
          />
          <div class="player-name">${player.name}</div>
          <div style="font-size:11px; color:#888">Player ${i + 1}</div>
          <div class="hp-bar-track">
            <div class="hp-bar-fill" style="width:100%"></div>
          </div>
          <div style="font-size:12px; color:#888">${player.hp} / ${player.maxHP} HP</div>
          <div style="font-size:12px; color:#BA7517">Moves: ${player.moves.length} / 4</div>
        `
        container.appendChild(card)
      })
    }

    displayPlayers()
  </script>

</body>
</html>
