
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Page 2 — Load Data</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      gap: 12px;
    }
    .card {
      background: #222244;
      border: 1px solid #534AB7;
      border-radius: 12px;
      padding: 24px 32px;
      min-width: 280px;
    }
    .label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .value {
      font-size: 18px;
      font-weight: bold;
      color: #1D9E75;
      margin-bottom: 16px;
    }
    .hp-track {
      height: 10px;
      background: #333;
      border-radius: 5px;
      overflow: hidden;
      margin-top: 4px;
    }
    .hp-fill {
      height: 100%;
      background: #1D9E75;
      border-radius: 5px;
    }
    button {
      padding: 10px 24px;
      background: #E24B4A;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { opacity: 0.85; }
    .error {
      color: #E24B4A;
      text-align: center;
    }
  </style>
</head>
<body>

  <h2>Catalogue Page (Page 2)</h2>
  <div id="content">Loading...</div>

  <script>
    // Runs as soon as page loads
    function loadPlayer() {
      const raw = localStorage.getItem('player1')

      // Guard — what if they came here directly without setup?
      if (!raw) {
        document.getElementById('content').innerHTML = `
          <p class="error">No player data found.<br>Please go back and create a character first.</p>
          <button onclick="window.location.href='page1.html'">Go Back</button>
        `
        return
      }

      // Parse the saved object
      const player = JSON.parse(raw)

      // Display the loaded data
      document.getElementById('content').innerHTML = `
        <div class="card">
          <div class="label">Player Name</div>
          <div class="value">${player.name}</div>

          <div class="label">HP</div>
          <div class="hp-track">
            <div class="hp-fill" style="width: ${(player.hp / player.maxHP) * 100}%"></div>
          </div>
          <div style="font-size:13px; color:#888; margin-top:4px">${player.hp} / ${player.maxHP}</div>

          <div class="label" style="margin-top:16px">Streak</div>
          <div class="value">${player.streak}</div>

          <div class="label">Moves selected</div>
          <div class="value">${player.moves.length} / 4</div>
        </div>
        <button onclick="clearAndGoBack()">Clear data & go back</button>
      `
    }

    function clearAndGoBack() {
      localStorage.removeItem('player1')
      window.location.href = 'page1.html'
    }

    // Load on page start
    loadPlayer()
  </script>

</body>
</html>
