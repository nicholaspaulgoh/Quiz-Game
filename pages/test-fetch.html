<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fetch Practice</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      gap: 16px;
    }

    button {
      padding: 12px 24px;
      background: #534AB7;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      background: #333;
      cursor: not-allowed;
    }

    #result {
      background: #222244;
      border-radius: 8px;
      padding: 20px;
      max-width: 500px;
      min-height: 60px;
      text-align: center;
      font-size: 15px;
      line-height: 1.6;
    }

    .loading {
      color: #BA7517;
    }

    .success {
      color: #1D9E75;
    }

    .error {
      color: #E24B4A;
    }
  </style>
</head>
<body>

  <h2>Fetch Practice</h2>
  <button id="btn" onclick="loadQuestion()">Get a Question</button>
  <div id="result">Click the button to fetch a question.</div>

  <script>
    async function loadQuestion() {
      const btn = document.getElementById('btn')
      const result = document.getElementById('result')

      // Show loading state
      btn.disabled = true
      btn.textContent = 'Loading...'
      result.className = 'loading'
      result.textContent = 'Fetching from API...'

      try {
        const response = await fetch('https://opentdb.com/api.php?amount=1&type=multiple')

        if (!response.ok) {
          throw new Error('API error: ' + response.status)
        }

        const data = await response.json()
        const q = data.results[0] //check console.log(data) to see the structure

        // Show the result
        result.className = 'success'
        result.textContent = '"' + q.question + '" — ' + q.correct_answer

      } catch (error) {
        // Show the error
        result.className = 'error'
        result.textContent = 'Failed to load: ' + error.message

      } finally {
        // This runs whether it succeeded or failed
        btn.disabled = false
        btn.textContent = 'Get Another Question'
      }
    }
  </script>

</body>
</html>
